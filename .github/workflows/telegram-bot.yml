name: Stride Telegram Bot Cron

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes (Smart Trigger heartbeat)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  trigger-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Bot API
        run: |
          curl -X GET "${{ secrets.BOT_URL }}/api/bot/cron?key=${{ secrets.CRON_SECRET }}"
